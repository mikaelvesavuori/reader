name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build release worker bundle
        run: npm run build

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          cp dist/worker.js release/worker.js
          cp README.md LICENSE package.json wrangler.toml release/
          cd release
          zip -r ../reader_${GITHUB_REF_NAME}.zip .
          cd ..
          shasum -a 256 dist/worker.js > worker.js.sha256
          shasum -a 256 reader_${GITHUB_REF_NAME}.zip > reader_${GITHUB_REF_NAME}.zip.sha256

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/worker.js
            worker.js.sha256
            reader_${{ github.ref_name }}.zip
            reader_${{ github.ref_name }}.zip.sha256
